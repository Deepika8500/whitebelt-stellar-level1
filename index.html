<!DOCTYPE html>
<html>
<head>
  <title>Stellar WhiteBelt dApp</title>
  <script src="https://unpkg.com/@stellar/stellar-sdk@latest/dist/stellar-sdk.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/5.0.0/index.min.js"></script>
  <style>body{font-family:Arial;padding:20px} button{padding:10px;margin:5px}</style>
</head>
<body>
  <h1>Stellar WhiteBelt - Level 1</h1>

  <button id="connect">Connect Freighter</button>
  <button id="disconnect" style="display:none">Disconnect</button>

  <p><b>Address:</b> <span id="address">Not Connected</span></p>
  <p><b>Balance:</b> <span id="balance">0 XLM</span></p>

  <input id="receiver" placeholder="Receiver Testnet Address" size="50"/>
  <button id="send">Send 1 XLM</button>
  <p id="tx-result"></p>

<script>
  var server = new StellarSdk.Horizon.Server('https://horizon-testnet.stellar.org');
  var publicKey = "";

 document.getElementById('connect').onclick = async function() {
  try {
    var connected = await window.freighterApi.isConnected();
    if (!connected.isConnected) {
      alert("Install Freighter Extension and set to TESTNET");
      return;
    }

    var allowed = await window.freighterApi.setAllowed();
    if (!allowed) {
      alert("Please allow this app in Freighter");
      return;
    }

    var addressResult = await window.freighterApi.getAddress();
    if (addressResult.error) {
      alert(addressResult.error.message);
      return;
    }

    publicKey = addressResult.address;
    document.getElementById('address').innerText = publicKey;
    document.getElementById('connect').style.display = 'none';
    document.getElementById('disconnect').style.display = 'inline';
    getBalance();
  } catch (e) {
    alert(e);
  }
};

  document.getElementById('disconnect').onclick = function() {
    publicKey = "";
    document.getElementById('address').innerText = "Not Connected";
    document.getElementById('balance').innerText = "0 XLM";
    document.getElementById('connect').style.display = 'inline';
    document.getElementById('disconnect').style.display = 'none';
  };

  function getBalance() {
    server.loadAccount(publicKey).then(function(account) {
      var xlm = account.balances.find(function(b) { return b.asset_type === 'native'; });
      document.getElementById('balance').innerText = xlm.balance + " XLM";
    });
  }

  document.getElementById('send').onclick = async function() {
    var receiver = document.getElementById('receiver').value;
    if (!receiver) {
      alert("Enter receiver address");
      return;
    }

    try {
      var account = await server.loadAccount(publicKey);
      var tx = new StellarSdk.TransactionBuilder(account, {
        fee: StellarSdk.BASE_FEE,
        networkPassphrase: StellarSdk.Networks.TESTNET
      })
      .addOperation(StellarSdk.Operation.payment({
        destination: receiver,
        asset: StellarSdk.Asset.native(),
        amount: "1"
      }))
      .setTimeout(30)
      .build();

      var signResult = await window.freighterApi.signTransaction(tx.toXDR(), { networkPassphrase: StellarSdk.Networks.TESTNET, address: publicKey });
      if (signResult.error) {
        throw new Error(signResult.error.message);
      }

      var result = await server.submitTransaction(
        StellarSdk.TransactionBuilder.fromXDR(signResult.signedTxXdr, StellarSdk.Networks.TESTNET)
      );

      document.getElementById('tx-result').innerText = "Success! Tx Hash: " + result.hash;
      getBalance();
    } catch (e) {
      document.getElementById('tx-result').innerText = "Transaction failed: " + (e.message || e);
    }
  };
</script>
</body>
</html>
